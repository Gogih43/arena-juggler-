var c=document.getElementById('G'),g=c.getContext('2d'),W=700,H=950;
c.width=W;c.height=H;
var BUILD='AJ-2025-07-001';
function fit(){var r=W/H,wr=innerWidth/innerHeight;
if(wr<r){c.style.width=innerWidth+'px';c.style.height=(innerWidth/r)+'px'}
else{c.style.height=innerHeight+'px';c.style.width=(innerHeight*r)+'px'}
c.style.marginTop=((innerHeight-parseInt(c.style.height))/2)+'px'}
onresize=fit;fit();

var t=0,state='menu',score=0,best=0,diff=1;
var jugPhase=0,maxBalls=3;
var px=W/2,pvx=0,playerY=H-130,lastPvx=0,prevMoveDir=0;
var items=[],particles=[],pops=[],balls=[];
var shake=0,hype=0,spawnT=0;
var lives=3,maxLives=5,shield=0,combo=0,comboTimer=0,invincible=0;
var shakeEnergy=0;
var crowdExcite=0; // 0=спокойны, 1=на ногах
var ballCols=['#FF2222','#22DD22','#2266FF','#FFDD00','#FF22FF','#22FFDD','#FF8800','#8800FF'];

// ТАКСА
var dogX=350,dogY=H-78,dogDir=1,dogSpd=1,dogCD=0,dogHasBall=true;
var dogTX=400,dogAnim=0,dogBark=0,dogWag=0;
var dogBallsLeft=5; // 5 мячей у собаки

try{best=+(localStorage.getItem('aj10')||0)}catch(e){}

var left=false,right=false;
var au;try{au=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
function snd(f,d,tp,v,dl){if(!au)return;try{var o=au.createOscillator(),gg=au.createGain();o.connect(gg);gg.connect(au.destination);o.type=tp||'sine';o.frequency.value=f;var s=au.currentTime+(dl||0);gg.gain.setValueAtTime(v||.06,s);gg.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d)}catch(e){}}
function sndGood(){snd(523,.08,'sine',.07);snd(659,.08,'sine',.06,.05);snd(784,.12,'sine',.07,.1)}
function sndGreat(){snd(523,.06,'sine',.08);snd(659,.06,'sine',.07,.04);snd(784,.06,'sine',.07,.08);snd(1047,.15,'sine',.08,.12)}
function sndHurt(){snd(200,.15,'sawtooth',.08);snd(150,.2,'sawtooth',.06,.1)}
function sndDrop(){snd(180,.15,'triangle',.07);snd(120,.2,'triangle',.05,.05);snd(90,.25,'triangle',.04,.1)}
function sndOver(){snd(400,.2,'sawtooth',.1);snd(300,.3,'sawtooth',.08,.15);snd(200,.5,'sawtooth',.1,.3)}
function sndBark(){snd(320,.05,'square',.05);snd(400,.04,'square',.04,.03);snd(360,.05,'square',.04,.06)}

function clickDog(){
  if(dogCD>0||!dogHasBall||dogBallsLeft<=0)return;
  dogCD=180;dogHasBall=false;dogBallsLeft--;
  dogBark=30;
  addBall();
  emit(dogX,dogY-10,'#FFD700',15,4);
  pop(dogX,dogY-35,'+BALL! (x'+countActive()+') 🎾'+(dogBallsLeft>0?' осталось:'+dogBallsLeft:'LAST!'),'#FFD700',true);
  sndBark();snd(440,.06,'square',.06);snd(660,.06,'square',.06,.05);
  shake=3;dogTX=dogX<W/2?W-100:100;dogSpd=3.5;
}

function getXY(ex,ey){var r=c.getBoundingClientRect();
  return{x:(ex-r.left)/r.width*W,y:(ey-r.top)/r.height*H}}

c.addEventListener('touchstart',function(e){e.preventDefault();if(au&&au.state==='suspended')au.resume();
if(state==='menu'){startGame();return}if(state==='dead'){state='menu';return}
for(var i=0;i<e.touches.length;i++){var p=getXY(e.touches[i].clientX,e.touches[i].clientY);
  var dd=Math.sqrt((p.x-dogX)*(p.x-dogX)+(p.y-dogY)*(p.y-dogY));
  if(dd<55&&dogHasBall&&dogCD<=0&&dogBallsLeft>0){clickDog();continue}
  if(p.x<W*.4)left=true;else if(p.x>W*.6)right=true}},{passive:false});
c.addEventListener('touchend',function(e){e.preventDefault();left=right=false},{passive:false});
c.addEventListener('click',function(e){if(au&&au.state==='suspended')au.resume();
if(state==='menu'){startGame();return}if(state==='dead'){state='menu';return}
var p=getXY(e.clientX,e.clientY);
var dd=Math.sqrt((p.x-dogX)*(p.x-dogX)+(p.y-dogY)*(p.y-dogY));
if(dd<55&&dogHasBall&&dogCD<=0&&dogBallsLeft>0){clickDog();return}
if(p.x<W*.35)left=true;else if(p.x>W*.65)right=true});
document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft'||e.key==='a')left=true;
if(e.key==='ArrowRight'||e.key==='d')right=true;
if(e.key===' '&&state==='play'&&dogHasBall&&dogCD<=0&&dogBallsLeft>0)clickDog();
if(state==='menu')startGame();
if(state==='dead'&&e.key==='Enter')state='menu';e.preventDefault()});
document.addEventListener('keyup',function(e){
if(e.key==='ArrowLeft'||e.key==='a')left=false;
if(e.key==='ArrowRight'||e.key==='d')right=false});

function emit(x,y,col,n,sp){for(var i=0;i<n;i++){var a=Math.random()*6.28,s=Math.random()*sp+1;
particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30+Math.random()*20,col:col})}}
function pop(x,y,txt,col,big){pops.push({x:x,y:y,txt:txt,col:col,life:55,big:big||false})}

// ═══ МЯЧИ v6 — чуть более экстремально ═══

function makeBall(idx,total){
  return{phase:(idx/total)*2,dropped:false,dx:0,dy:0,dvx:0,dvy:0,bounces:0,
    col:ballCols[idx%ballCols.length],trail:[]}
}
function countActive(){var n=0;for(var i=0;i<balls.length;i++)if(!balls[i].dropped)n++;return n}

function resetBalls(){
  balls=[];maxBalls=3;shakeEnergy=0;prevMoveDir=0;
  for(var i=0;i<3;i++)balls.push(makeBall(i,3));
}

function addBall(){
  var active=countActive();
  var b=makeBall(balls.length,active+1);
  var phases=[];
  for(var i=0;i<balls.length;i++)if(!balls[i].dropped)phases.push(balls[i].phase);
  if(phases.length>0){
    phases.sort(function(a,b2){return a-b2});
    var mg=0,bp=0;
    for(var i=0;i<phases.length;i++){
      var nx=i<phases.length-1?phases[i+1]:phases[0]+2;
      if(nx-phases[i]>mg){mg=nx-phases[i];bp=(phases[i]+mg/2)%2}}
    b.phase=bp;
  }
  balls.push(b);
  if(active+1>maxBalls)maxBalls=active+1;
  shakeEnergy+=6;
}

function dropBall(){
  var active=countActive();
  if(active<=1)return;
  var candidates=[];
  for(var i=0;i<balls.length;i++)if(!balls[i].dropped)candidates.push(i);
  var idx=candidates[Math.floor(Math.random()*candidates.length)];
  var b=balls[idx],pos=ballPos(b.phase);
  var wob=getWobbleAmt();
  b.dropped=true;
  b.dx=pos.x+(Math.random()-.5)*wob*20;b.dy=pos.y;
  b.dvx=pvx*0.5+(Math.random()-.5)*5;b.dvy=-3-Math.random()*3;b.bounces=0;
  shake=10;combo=0;comboTimer=0;
  emit(b.dx,b.dy,b.col,15,5);
  pop(b.dx,b.dy-30,'DROPPED!','#FF8844',true);
  sndDrop();
}

function getThreshold(){
  var active=countActive();
  // Чуть ниже: 3=50, 4=40, 5=30, 6=22, 7=16, 8=12
  return Math.max(12, 50-(active-3)*10);
}
function getWobbleAmt(){return Math.min(1,shakeEnergy/getThreshold())}

function ballPos(phase){
  var active=Math.max(countActive(),1);
  var spread=36+active*5,arcH=60+active*16;
  var lx=px-spread,rx=px+spread,hy=playerY-18;
  var p=((phase%2)+2)%2,bx,by;
  if(p<1){bx=rx+(lx-rx)*p;by=hy-arcH*4*p*(1-p)}
  else{var p2=p-1;bx=lx+(rx-lx)*p2;by=hy-arcH*4*p2*(1-p2)}
  return{x:bx,y:by}
}

function updateBalls(){
  var speed=Math.abs(pvx);
  var active=countActive();
  // Детектор смены направления
  var curDir=pvx>1?1:(pvx<-1?-1:0);
  if(curDir!==0&&prevMoveDir!==0&&curDir!==prevMoveDir){
    // Чуть сильнее удар: speed*4+7 (было 3.5+6)
    shakeEnergy+=speed*4+7;
  }
  if(curDir!==0)prevMoveDir=curDir;
  shakeEnergy+=speed*0.035;
  // Чуть медленнее затухание: 0.983 (было 0.985)
  shakeEnergy*=0.983;
  if(shakeEnergy<0.1)shakeEnergy=0;

  var threshold=getThreshold();
  if(shakeEnergy>threshold&&active>1){
    dropBall();
    shakeEnergy=threshold*0.25;
  }

  // Проверка проигрыша: 1 мяч + нет мячей у собаки
  if(active<=1&&dogBallsLeft<=0&&!dogHasBall){
    gameOver();return;
  }

  var phaseSpd=0.018+active*0.001;
  for(var i=balls.length-1;i>=0;i--){
    var b=balls[i];
    if(b.dropped){
      b.dvy+=0.35;b.dx+=b.dvx;b.dy+=b.dvy;b.dvx*=0.97;
      if(b.dy>playerY+50){b.dy=playerY+50;b.dvy*=-0.25;b.dvx*=0.5;b.bounces++;
        if(b.bounces>3||Math.abs(b.dvy)<0.5)balls.splice(i,1)}
      if(b.dx<10||b.dx>W-10)b.dvx*=-0.5;
      continue;
    }
    b.phase+=phaseSpd;if(b.phase>=2)b.phase-=2;
    var pos=ballPos(b.phase);
    var wob=getWobbleAmt();
    var ox=Math.sin(t*0.12+i*2.1)*wob*18;
    var oy=Math.cos(t*0.15+i*1.7)*wob*9;
    b.trail.push({x:pos.x+ox,y:pos.y+oy});
    if(b.trail.length>6)b.trail.shift();
  }
  jugPhase+=phaseSpd;if(jugPhase>=2)jugPhase-=2;
}

function drawBalls(){
  var wob=getWobbleAmt();
  for(var i=0;i<balls.length;i++){
    var b=balls[i],bx,by;
    if(b.dropped){bx=b.dx;by=b.dy;g.globalAlpha=0.5}
    else{var pos=ballPos(b.phase);
      bx=pos.x+Math.sin(t*0.12+i*2.1)*wob*18;
      by=pos.y+Math.cos(t*0.15+i*1.7)*wob*9}
    g.fillStyle='rgba(0,0,0,0.08)';g.beginPath();g.ellipse(bx,playerY+42,6,2,0,0,6.28);g.fill();
    if(!b.dropped){for(var tr=0;tr<b.trail.length;tr++){
      g.globalAlpha=0.04*(tr/b.trail.length);g.fillStyle=b.col;
      g.beginPath();g.arc(b.trail[tr].x,b.trail[tr].y,6*(tr/b.trail.length),0,6.28);g.fill()}g.globalAlpha=1}
    var bg2=g.createRadialGradient(bx-3,by-3,0,bx,by,12);
    bg2.addColorStop(0,'#FFF');bg2.addColorStop(0.3,b.col);bg2.addColorStop(1,b.col);
    g.fillStyle=bg2;g.beginPath();g.arc(bx,by,11,0,6.28);g.fill();
    g.strokeStyle='rgba(0,0,0,0.2)';g.lineWidth=1;g.beginPath();g.arc(bx,by,11,0,6.28);g.stroke();
    g.globalAlpha=1;
    if(!b.dropped&&wob>0.4){var danger=(wob-0.4)/0.6,pulse=0.5+Math.sin(t*.15+i)*.3;
      g.strokeStyle='rgba(255,50,50,'+(danger*0.6*pulse)+')';g.lineWidth=2+danger*2;g.setLineDash([4,4]);
      g.beginPath();g.arc(bx,by,14+danger*4,0,6.28);g.stroke();g.setLineDash([]);
      if(danger>0.5){g.fillStyle='rgba(255,80,80,'+(danger*pulse)+')';
        g.font='bold 14px Arial';g.textAlign='center';g.fillText('!',bx,by-18)}}
  }
}

// ═══ ТАКСА ═══
function updateDog(){
  var dx=dogTX-dogX;
  if(Math.abs(dx)<15){dogTX=80+Math.random()*(W-160);dogSpd=0.6+Math.random()*0.5}
  dogDir=dx>0?1:-1;
  var spd=Math.min(dogSpd,Math.abs(dx)*0.03+0.2);
  dogX+=dogDir*spd;
  if(dogX<60)dogX=60;if(dogX>W-60)dogX=W-60;
  dogAnim+=spd*0.2;dogWag+=0.18;
  dogSpd+=(1-dogSpd)*0.01;
  if(dogCD>0){dogCD--;if(dogCD<=0&&dogBallsLeft>0)dogHasBall=true}
  if(dogBark>0)dogBark--;
}

function drawDog(){
  g.save();g.translate(dogX,dogY);g.scale(0.75,0.75);
  if(dogDir<0)g.scale(-1,1);
  var bounce=Math.abs(Math.sin(dogAnim))*2.5*(dogSpd>0.3?1:0.1);
  g.translate(0,-bounce);
  g.fillStyle='rgba(0,0,0,0.12)';g.beginPath();g.ellipse(5,bounce+15,24,5,0,0,6.28);g.fill();
  // Хвост
  var wag=Math.sin(dogWag*2.5)*.6;
  g.save();g.translate(-20,-2);g.rotate(-0.6+wag);
  g.strokeStyle='#CC6622';g.lineWidth=3.5;g.lineCap='round';
  g.beginPath();g.moveTo(0,0);g.quadraticCurveTo(-3,-10,-1,-18);g.stroke();g.restore();
  // Задние лапы
  for(var l=0;l<2;l++){var lx=-6+l*7,lo=Math.sin(dogAnim+l*3.14)*2.5;
    g.fillStyle='#BB5511';g.beginPath();g.moveTo(lx-2.5,6);g.lineTo(lx-3,14+lo);g.lineTo(lx+3,14+lo);g.lineTo(lx+2.5,6);g.closePath();g.fill();
    g.fillStyle='#CC6622';g.beginPath();g.ellipse(lx,15+lo,4,2,0,0,6.28);g.fill()}
  // Тело
  g.fillStyle='#CC6622';g.beginPath();g.ellipse(5,0,32,11,0,0,6.28);g.fill();
  g.fillStyle='#B55A18';g.beginPath();g.ellipse(3,-5,25,5,-0.05,3.14,6.28);g.fill();
  g.fillStyle='#DDA055';g.beginPath();g.ellipse(5,5,24,6,0,0,3.14);g.fill();
  // Передние лапы
  for(var l=0;l<2;l++){var lx=24+l*7,lo=Math.sin(dogAnim+3.14+l*3.14)*2.5;
    g.fillStyle='#BB5511';g.beginPath();g.moveTo(lx-2.5,6);g.lineTo(lx-3,14+lo);g.lineTo(lx+3,14+lo);g.lineTo(lx+2.5,6);g.closePath();g.fill();
    g.fillStyle='#CC6622';g.beginPath();g.ellipse(lx,15+lo,4,2,0,0,6.28);g.fill()}
  // Ошейник
  g.fillStyle='#DD2222';g.beginPath();g.ellipse(30,0,5,4.5,0.15,0,6.28);g.fill();
  g.fillStyle='#FFD700';g.beginPath();g.arc(33,2,3,0,6.28);g.fill();
  // Голова
  g.save();g.translate(37,-5);
  g.fillStyle='#CC6622';g.beginPath();g.ellipse(0,0,11,11,0,0,6.28);g.fill();
  g.fillStyle='#DD7733';g.beginPath();g.ellipse(14,3,10,7,0.08,0,6.28);g.fill();
  g.fillStyle='#CC6622';g.beginPath();g.ellipse(14,0,9,4,0.05,3.14,6.28);g.fill();
  g.fillStyle='#222';g.beginPath();g.ellipse(22,1,4,3.5,0,0,6.28);g.fill();
  g.fillStyle='rgba(255,255,255,0.2)';g.beginPath();g.arc(21,-0.5,1.5,0,6.28);g.fill();
  g.fillStyle='#FFF';g.beginPath();g.ellipse(2,-4,5,5.5,0,0,6.28);g.fill();
  g.fillStyle='#553300';g.beginPath();g.arc(3,-4,3,0,6.28);g.fill();
  g.fillStyle='#221100';g.beginPath();g.arc(3.5,-4,1.8,0,6.28);g.fill();
  g.fillStyle='#FFF';g.beginPath();g.arc(1.5,-5.5,1.3,0,6.28);g.fill();
  g.strokeStyle='#995522';g.lineWidth=2;g.lineCap='round';g.beginPath();g.arc(2,-8,5,3.6,5.8);g.stroke();
  // Ухо
  g.save();g.translate(-4,-5);g.rotate(-0.1+Math.sin(t*.05)*.05);
  g.fillStyle='#AA5511';g.beginPath();g.moveTo(0,0);g.quadraticCurveTo(-9,8,-7,22);
  g.quadraticCurveTo(-3,24,0,16);g.quadraticCurveTo(3,6,0,0);g.fill();
  g.fillStyle='#CC8844';g.beginPath();g.ellipse(-3,12,3,5,-0.1,0,6.28);g.fill();g.restore();
  // Рот
  if(dogBark>15){g.fillStyle='#CC6666';g.beginPath();g.ellipse(16,8,6,4,0.1,0,3.14);g.fill();
    g.fillStyle='#FF8888';g.beginPath();g.ellipse(16,9,3,2.5,0,0,6.28);g.fill()
  }else if(dogSpd>2){g.fillStyle='#FF8888';g.beginPath();g.moveTo(16,5);g.quadraticCurveTo(18,10,15,14);
    g.quadraticCurveTo(13,10,16,5);g.fill()
  }else{g.strokeStyle='#885533';g.lineWidth=1;g.lineCap='round';g.beginPath();g.arc(16,4,4,0.1,1.5);g.stroke()}
  // Мяч в пасти
  if(dogHasBall&&dogBallsLeft>0){var bc=ballCols[(balls.length)%8];
    g.fillStyle=bc;g.beginPath();g.arc(18,5,5.5,0,6.28);g.fill();
    g.fillStyle='rgba(255,255,255,0.3)';g.beginPath();g.arc(17,4,2,0,6.28);g.fill()}
  g.restore();g.restore();

  // Счётчик мячей у собаки
  if(dogBallsLeft>0){
    for(var i=0;i<dogBallsLeft;i++){
      var bx2=dogX-12+i*7,by2=dogY+16;
      g.fillStyle=ballCols[i%8];g.beginPath();g.arc(bx2,by2,3.5,0,6.28);g.fill();
      g.fillStyle='rgba(255,255,255,0.2)';g.beginPath();g.arc(bx2-1,by2-1,1.2,0,6.28);g.fill();
    }
  }else{
    // Нет мячей — грустная собака
    g.fillStyle='rgba(255,100,100,0.5)';g.font='10px Arial';g.textAlign='center';
    g.fillText('нет мячей',dogX,dogY+18);
  }

  // Подсказка
  if(dogHasBall&&dogCD<=0&&dogBallsLeft>0){
    var pulse=0.5+Math.sin(t*.08)*.4;
    g.strokeStyle='rgba(255,220,0,'+pulse+')';g.lineWidth=2;g.setLineDash([5,5]);
    g.beginPath();g.ellipse(dogX,dogY,42,22,0,0,6.28);g.stroke();g.setLineDash([]);
    var ty=dogY-25+Math.sin(t*.06)*3;
    g.fillStyle='rgba(0,0,0,0.4)';g.fillRect(dogX-38,ty-12,76,16);
    g.fillStyle='rgba(255,220,0,'+(0.7+pulse*0.3)+')';
    g.font='bold 11px Arial';g.textAlign='center';
    g.fillText('🎾 CLICK ('+dogBallsLeft+')',dogX,ty);
  }
  if(dogBark>15){g.fillStyle='#FFF';g.font='bold 13px Arial';g.textAlign='center';
    g.fillText('ГАВ!',dogX+(dogDir>0?30:-30),dogY-22)}
}

// ═══ ЗРИТЕЛИ (реактивные) ═══
function drwCrowd(){
  // Рассчитываем уровень опасности
  var wob=getWobbleAmt();
  var lifeDanger=Math.max(0,1-lives/3);
  var ballDanger=countActive()<=2&&dogBallsLeft<=1?0.5:0;
  var targetExcite=Math.min(1,wob*0.7+lifeDanger*0.4+ballDanger);
  // Плавный переход
  crowdExcite+=(targetExcite-crowdExcite)*0.04;

  var ex=crowdExcite;

  for(var row=0;row<4;row++){var cnt=14+row*4;
    for(var i=0;i<cnt;i++){var tt=(i+.5)/cnt;
      var mx=W*.05+W*.9*tt;
      var baseY=60+row*28+Math.sin(tt*3.14)*(6+row*3);
      // Вставание: чем больше ex, тем выше
      var standUp=ex*12*(1+Math.sin(i*1.7+t*.03)*.3);
      var my=baseY-standUp;
      var bn=Math.sin(t*.04+i+row)*(1+ex*8);
      var cols=['#E55','#58F','#5D5','#FA3','#F5F','#5FF','#F95','#FFF'];
      var skinCols=['#FFE0BD','#F5C5A3','#D4A373','#C68642'];
      var col=cols[(i+row)%cols.length];
      var skin=skinCols[(i*3+row)%4];

      // Тело (выше при вставании)
      var bodyH=7+standUp*0.5;
      g.fillStyle=col;g.fillRect(mx-3,my+bn+3,6,bodyH);

      // Голова
      g.fillStyle=skin;
      g.beginPath();g.arc(mx,my+bn,4,0,6.28);g.fill();

      // ═══ РУКИ (поднимаются при опасности) ═══
      if(ex>0.15){
        var armUp=ex;
        g.strokeStyle=skin;g.lineWidth=1.5;g.lineCap='round';
        // Левая рука
        var laX=mx-3,laY=my+bn+5;
        var laEndX=laX-4-armUp*3;
        var laEndY=laY-armUp*12+Math.sin(t*.08+i)*armUp*4;
        g.beginPath();g.moveTo(laX,laY);g.lineTo(laEndX,laEndY);g.stroke();
        // Правая рука
        var raX=mx+3,raY=my+bn+5;
        var raEndX=raX+4+armUp*3;
        var raEndY=raY-armUp*12+Math.sin(t*.08+i+1)*armUp*4;
        g.beginPath();g.moveTo(raX,raY);g.lineTo(raEndX,raEndY);g.stroke();
      }

      // ═══ ВЫРАЖЕНИЕ ЛИЦА ═══
      if(ex>0.5){
        // Открытый рот (ох!)
        g.fillStyle='#822';
        g.beginPath();g.ellipse(mx,my+bn+2,1.5,1+ex,0,0,6.28);g.fill();
      }

      // Плакаты при высокой опасности
      if(ex>0.6&&i%5===0&&row<2){
        g.save();g.translate(mx,my+bn-12);g.rotate(Math.sin(t*.03+i)*.15);
        g.fillStyle='rgba(255,255,255,0.7)';g.fillRect(-12,-8,24,12);
        g.fillStyle='#D00';g.font='bold 7px Arial';g.textAlign='center';
        g.fillText(ex>0.8?'ОЙ!':'ОГО!',0,-1);
        g.restore();
      }
    }
  }
}

function spawnItem(){
  var r=Math.random();
  var o={x:50+Math.random()*(W-100),y:-30,vy:0,rot:0,w:24,h:24,good:false,tp:'rock'};
  if(r<.28){o.tp='rock';o.good=false;o.vy=2.2+diff*.35+Math.random()*.5;o.w=22}
  else if(r<.42){o.tp='bomb';o.good=false;o.vy=1.8+diff*.25;o.w=24}
  else if(r<.50){o.tp='anvil';o.good=false;o.vy=1+diff*.18;o.w=50;o.h=38;o.y=-50}
  else if(r<.68){o.tp='star';o.good=true;o.vy=1.8+diff*.2;o.w=22}
  else if(r<.78){o.tp='heart';o.good=true;o.vy=1.5+diff*.15;o.w=22}
  else if(r<.86){o.tp='diamond';o.good=true;o.vy=2.2+diff*.25;o.w=18;o.h=24}
  else if(r<.93){o.tp='shield';o.good=true;o.vy=1.7+diff*.18;o.w=24;o.h=26}
  else{o.tp='banana';o.good=false;o.vy=2+diff*.2;o.w=28;o.h=12}
  items.push(o);
}

    g.fillStyle=gg2;g.beginPath();g.arc(0,0,glR,0,6.28);g.fill()
  }else if(o.tp!=='banana'){var gg2=g.createRadialGradient(0,0,0,0,0,glR);gg2.addColorStop(0,'rgba(255,60,60,0.18)');gg2.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gg2;g.beginPath();g.arc(0,0,glR,0,6.28);g.fill()}
  g.rotate(o.rot);
  if(o.tp==='rock'){g.fillStyle='#888';g.beginPath();g.moveTo(-10,-8);g.lineTo(-5,-12);g.lineTo(6,-11);g.lineTo(12,-4);g.lineTo(10,8);g.lineTo(-2,12);g.lineTo(-11,5);g.closePath();g.fill()

  }else if(o.tp==='star'){g.fillStyle='#FFD700';g.beginPath();for(var i=0;i<5;i++){var a1=i/5*6.28-1.57,a2=(i+.5)/5*6.28-1.57;g.lineTo(Math.cos(a1)*12,Math.sin(a1)*12);g.lineTo(Math.cos(a2)*5,Math.sin(a2)*5)}g.closePath();g.fill()
  }else if(o.tp==='heart'){g.fillStyle='#FF3366';g.beginPath();g.moveTo(0,8);g.bezierCurveTo(-14,-2,-12,-14,0,-8);g.bezierCurveTo(12,-14,14,-2,0,8);g.fill()
  }else if(o.tp==='diamond'){g.fillStyle='#44DDFF';g.beginPath();g.moveTo(0,-12);g.lineTo(9,-3);g.lineTo(0,12);g.lineTo(-9,-3);g.closePath();g.fill()

  }else if(o.tp==='banana'){g.fillStyle='#FFE020';g.beginPath();g.ellipse(0,0,o.w/2,o.h/2,.3,0,6.28);g.fill()}

function updItems(){
  for(var i=items.length-1;i>=0;i--){
    var o=items[i];o.y+=o.vy;o.rot+=(o.tp==='rock'?.03:o.tp==='star'?.02:.005);
    if(o.y>H+30){if(o.good&&o.tp==='star'){combo=0;comboTimer=0}items.splice(i,1);continue}
    var dx=Math.abs(o.x-px),dy=Math.abs(o.y-playerY),hd=o.tp==='anvil'?35:25;
    if(dx<hd&&dy<45){
      if(o.good){
        if(o.tp==='star'){var pts=50*countActive()*(1+combo*.5);pts=Math.floor(pts);score+=pts;combo++;comboTimer=120;emit(o.x,o.y,'#FFD700',10,4);pop(o.x,o.y-30,combo>1?'+'+pts+' x'+combo:'+'+pts,'#FFD700',true);sndGood();hype+=.5
        }else if(o.tp==='heart'){if(lives<maxLives){lives++;emit(o.x,o.y,'#FF3366',15,4);pop(o.x,o.y-30,'+1 ❤','#FF3366',true);sndGreat()}else{score+=100;emit(o.x,o.y,'#FF3366',8,3);pop(o.x,o.y-30,'+100','#FF8888');sndGood()}
        }else if(o.tp==='diamond'){var pts2=200*countActive();score+=pts2;emit(o.x,o.y,'#44DDFF',20,5);pop(o.x,o.y-30,'+'+pts2,'#44DDFF',true);sndGreat();hype+=1
        }else if(o.tp==='shield'){shield=300;emit(o.x,o.y,'#3388FF',15,4);pop(o.x,o.y-30,'SHIELD!','#3388FF',true);snd(330,.1,'square',.05)}
        items.splice(i,1)
      }else{
        if(o.tp==='banana'){pvx=(Math.random()-.5)*12;shake=5;shakeEnergy+=12;emit(o.x,o.y,'#FFE020',8,3);pop(o.x,o.y-30,'SLIP!','#FFE020');items.splice(i,1)
        }else if(invincible<=0){
          if(shield>0){shield=0;shake=3;emit(o.x,o.y,'#3388FF',15,5);pop(o.x,o.y-30,'BLOCKED!','#3388FF',true);items.splice(i,1)
          }else{lives--;shake=12;invincible=90;combo=0;comboTimer=0;emit(o.x,o.y,'#FF4444',20,5);sndHurt();
            if(o.tp==='bomb'){shake=15;emit(o.x,o.y,'#FF8800',25,6);pop(o.x,o.y-30,'BOOM!','#FF8800',true)}
            else if(o.tp==='anvil'){shake=18;pop(o.x,o.y-30,'OUCH!','#FF4444',true)}
            else pop(o.x,o.y-30,'-1 ❤','#FF4444');
            items.splice(i,1);if(lives<=0){gameOver();return}}
        }else items.splice(i,1)}
    }
    if(!o._sc&&!o.good&&o.tp!=='banana'&&o.y>playerY+30){o._sc=true;var dp=10*countActive();score+=dp;pop(px,playerY-50,'dodge +'+dp,'#AAFFAA')}
  }
}

function drwFX(){
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}
    g.globalAlpha=p.life/30;g.fillStyle=p.col;g.beginPath();g.arc(p.x,p.y,3*(p.life/30),0,6.28);g.fill()}
  g.globalAlpha=1;
  for(var i=pops.length-1;i>=0;i--){var p=pops[i];p.y-=1.2;p.life--;if(p.life<=0){pops.splice(i,1);continue}
    g.globalAlpha=Math.min(1,p.life/20);g.font=p.big?'bold 22px Arial':'bold 16px Arial';g.textAlign='center';
    g.strokeStyle='#000';g.lineWidth=3;g.strokeText(p.txt,p.x,p.y);g.fillStyle=p.col;g.fillText(p.txt,p.x,p.y)}
  g.globalAlpha=1;
}

function gameOver(){

  emit(px,playerY,'#FF4444',40,6);emit(px,playerY,'#FFDD00',20,4);shake=20;
}

  items=[];particles=[];pops=[];shake=0;hype=0;spawnT=0;t=0;
  lives=3;shield=0;combo=0;comboTimer=0;invincible=0;shakeEnergy=0;crowdExcite=0;
  dogX=350;dogY=H-78;dogDir=1;dogSpd=1;dogCD=0;dogHasBall=true;
  dogTX=400;dogAnim=0;dogBark=0;dogWag=0;dogBallsLeft=5;
  resetBalls();
}

// ═══ HUD ═══
function drwHUD(){
  for(var i=0;i<maxLives;i++){var hx=20+i*32,hy=232;
    g.fillStyle=i<lives?'#FF3366':'#443';g.beginPath();g.moveTo(hx,hy+6);
    g.bezierCurveTo(hx-10,hy-1,hx-9,hy-10,hx,hy-5);
    g.bezierCurveTo(hx+9,hy-10,hx+10,hy-1,hx,hy+6);g.fill()}
  if(shield>0){g.fillStyle='rgba(50,130,255,0.5)';g.fillRect(20,245,shield/300*140,8);
    g.strokeStyle='#3388FF';g.lineWidth=1;g.strokeRect(20,245,140,8)}
  g.fillStyle='#FFF';g.font='bold 22px Arial';g.textAlign='left';g.fillText('Score: '+score,15,275);
  var active=countActive();
  g.fillStyle=active>=5?'#FF6644':active<=2?'#FF4444':'#FFD700';
  g.font='bold 16px Arial';
  g.fillText('🎪 x'+active+' balls',15,296);

  // Предупреждение
  if(active<=2&&dogBallsLeft<=1){
    var wa=0.5+Math.sin(t*.1)*.4;
    g.fillStyle='rgba(255,50,50,'+wa+')';g.font='bold 14px Arial';
    g.fillText('⚠ LAST CHANCE!',15,340);
  }

  // Стабильность
  var th=getThreshold(),fill=Math.min(1,shakeEnergy/th);
  g.fillStyle='rgba(0,0,0,0.3)';g.fillRect(15,302,130,12);
  g.fillStyle=fill<0.3?'#44FF44':fill<0.6?'#FFAA00':'#FF4444';
  g.fillRect(15,302,130*(1-fill),12);
  g.strokeStyle='rgba(255,255,255,0.2)';g.lineWidth=1;g.strokeRect(15,302,130,12);
  g.fillStyle='#FFF';g.font='bold 9px Arial';
  g.fillText(fill<0.3?'STABLE':fill<0.6?'⚠ shaky':'⚠ DANGER!',50,312);

  if(combo>1&&comboTimer>0){g.globalAlpha=Math.min(1,comboTimer/30);
    g.fillStyle='#FFD700';g.font='bold 18px Arial';g.fillText('COMBO x'+combo+'!',15,360);g.globalAlpha=1}
  g.fillStyle='#888';g.font='14px Arial';g.fillText('Best: '+Math.max(score,best),15,380);

  // Инфо справа
  g.font='11px Arial';g.textAlign='right';
  g.fillStyle='#6A6';g.fillText('★♦♥🛡 = CATCH',W-15,232);
  g.fillStyle='#A55';g.fillText('●💣▄ = DODGE',W-15,248);
  g.fillStyle='#CA8';g.fillText('🐕 Dog balls: '+dogBallsLeft+'/5',W-15,264);
  g.fillStyle='#AA8';g.fillText('Smooth moves!',W-15,280);

  // Копирайт (мелко)
  g.fillStyle='rgba(255,255,255,0.12)';g.font='9px Arial';g.textAlign='center';
  g.fillText('© 2025 Arena Juggler',W/2,H-3);
}

// ═══ UPDATE ═══
function update(){
  if(state!=='play')return;t++;diff=1+t/2400;
  if(shake>0)shake-=.3;if(shield>0)shield--;
  if(invincible>0)invincible--;
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0}
  hype*=.995;
  var dir=0;if(left)dir=-1;if(right)dir=1;
  if(dir)pvx+=(dir*6.5-pvx)*.28;else pvx*=.86;
  px+=pvx;if(px<40)px=40;if(px>W-40)px=W-40;
  updateBalls();lastPvx=pvx;
  updateDog();
  var rate=Math.max(20,55-diff*5);spawnT++;
  if(spawnT>=rate){spawnT=0;spawnItem();
    if(diff>2.5&&Math.random()<.2)spawnItem();
    if(diff>4&&Math.random()<.1)spawnItem()}
  updItems();
  if(t%8===0)score+=Math.max(1,countActive());
}

// ═══ ЭКРАНЫ ═══
function drwMenu(){
  t++;crowdExcite=0.1+Math.sin(t*.01)*.1;
  drwBg();drwCrowd();drwFloor();drwSpots();
  drawClown(W/2,playerY+10,1.3,t*.025,3);
  g.save();var ts=1+Math.sin(t*.02)*.03;g.translate(W/2,300);g.scale(ts,ts);
  g.fillStyle='#DAA520';g.font='bold 44px Arial';g.textAlign='center';
  g.strokeStyle='#000';g.lineWidth=5;g.strokeText('ARENA JUGGLER',0,0);g.fillText('ARENA JUGGLER',0,0);g.restore();
  g.fillStyle='rgba(0,0,0,0.55)';g.fillRect(W/2-180,430,360,150);
  g.strokeStyle='#DAA52044';g.lineWidth=1;g.strokeRect(W/2-180,430,360,150);
  g.font='13px Arial';g.textAlign='center';
  g.fillStyle='#6C6';g.fillText('★ Star = pts   ♥ Heart = life   ◆ Diamond = MEGA',W/2,450);
  g.fillStyle='#6CF';g.fillText('🛡 Shield = block 1 hit',W/2,468);
  g.fillStyle='#F66';g.fillText('● Rock  💣 Bomb  ▄ Anvil = DAMAGE',W/2,486);
  g.fillStyle='#CA8';g.font='bold 13px Arial';g.fillText('🐕 Click dachshund = +ball (5 total)',W/2,508);
  g.fillStyle='#FF8';g.fillText('⚠ Sharp turns = drop balls!',W/2,528);
  g.fillStyle='#F88';g.font='12px Arial';g.fillText('1 ball left + no dog balls = GAME OVER',W/2,548);
  g.fillStyle='#888';g.fillText('← → / A D / touch sides | Space = dog',W/2,568);
  g.fillStyle='#DAA520';g.fillRect(W/2-90,365,180,50);
  g.fillStyle='#FFF';g.font='bold 26px Arial';g.fillText('PLAY',W/2,398);
  if(best>0){g.fillStyle='#DAA520';g.font='14px Arial';g.fillText('Best: '+best,W/2,355)}
  g.fillStyle='rgba(255,255,255,0.15)';g.font='10px Arial';
  g.fillText('© 2025 Arena Juggler. All rights reserved. '+BUILD,W/2,H-5);
}

function drwGame(){
  g.save();if(shake>.5)g.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
  drwBg();drwCrowd();drwFloor();drwSpots();
  for(var i=0;i<items.length;i++)drawItem(items[i]);
  drawDog();
  drawClown(px,playerY,1,jugPhase,0);
  drawBalls();
  drwFX();g.restore();drwHUD();
}

function drwDead(){
  t++;crowdExcite*=0.98;
  drwBg();drwCrowd();drwFloor();drwFX();
  g.fillStyle='rgba(0,0,0,.6)';g.fillRect(0,0,W,H);
  var pw=340,ph=400,ppx=W/2-pw/2,ppy=H/2-ph/2;
  g.fillStyle='rgba(15,8,30,.92)';g.fillRect(ppx,ppy,pw,ph);
  g.strokeStyle='#DAA520';g.lineWidth=3;g.strokeRect(ppx,ppy,pw,ph);
  g.textAlign='center';g.fillStyle='#FF4444';g.font='bold 32px Arial';g.fillText('GAME OVER',W/2,ppy+45);
  // Причина проигрыша
  if(lives<=0){g.fillStyle='#FF8888';g.font='16px Arial';g.fillText('No lives left!',W/2,ppy+72)}
  else{g.fillStyle='#FF8888';g.font='16px Arial';g.fillText('Last ball — no reserves!',W/2,ppy+72)}
  drawClown(W/2,ppy+165,.8,0,0);
  g.fillStyle='#FFF';g.font='bold 24px Arial';g.fillText('Score: '+score,W/2,ppy+245);
  g.fillStyle='#FFD700';g.font='16px Arial';g.fillText('Max balls juggled: '+maxBalls,W/2,ppy+270);
  if(score>=best&&score>0){g.fillStyle='#FFD700';g.font='bold 20px Arial';g.fillText('★ NEW RECORD! ★',W/2,ppy+300)}
  g.fillStyle='#DAA520';g.fillRect(W/2-70,ppy+315,140,45);
  g.fillStyle='#FFF';g.font='bold 20px Arial';g.fillText('RETRY',W/2,ppy+344);
  g.fillStyle='#888';g.font='12px Arial';g.fillText('Tap or Enter',W/2,ppy+380);
  g.fillStyle='rgba(255,255,255,0.12)';g.font='9px Arial';
  g.fillText('© 2025 Arena Juggler',W/2,ppy+395);
}

function loop(){
  g.clearRect(0,0,W,H);
  if(state==='menu')drwMenu();
  else if(state==='play'){update();drwGame()}
  else if(state==='dead')drwDead();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
