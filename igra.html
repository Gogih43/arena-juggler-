(function(){
"use strict";

var c=document.getElementById('G'),g=c.getContext('2d'),W=700,H=950;
c.width=W;c.height=H;
var BUILD='AJ-2025-07-FINAL';

function fit(){
  var r=W/H,wr=innerWidth/innerHeight;
  if(wr<r){c.style.width=innerWidth+'px';c.style.height=(innerWidth/r)+'px'}
  else{c.style.height=innerHeight+'px';c.style.width=(innerHeight*r)+'px'}
  c.style.marginTop=((innerHeight-parseInt(c.style.height))/2)+'px';
}
onresize=fit;fit();

// Убираем загрузку
setTimeout(function(){document.getElementById('loading').className='done'},300);

var t=0,state='menu',score=0,best=0,diff=1;
var jugPhase=0,maxBalls=3;
var px=W/2,pvx=0,playerY=H-130,lastPvx=0,prevMoveDir=0;
var items=[],particles=[],pops=[],balls=[];
var shake=0,hype=0,spawnT=0;
var lives=3,maxLives=5,shield=0,combo=0,comboTimer=0,invincible=0;
var shakeEnergy=0,crowdExcite=0;
var ballCols=['#FF2222','#22DD22','#2266FF','#FFDD00','#FF22FF','#22FFDD','#FF8800','#8800FF'];
var dogX=350,dogY=H-78,dogDir=1,dogSpd=1,dogCD=0,dogHasBall=true;
var dogTX=400,dogAnim=0,dogBark=0,dogWag=0,dogBallsLeft=5;

try{best=+(localStorage.getItem('aj_final')||0)}catch(e){}

var left=false,right=false;
var au;try{au=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}

function snd(f,d,tp,v,dl){if(!au)return;try{var o=au.createOscillator(),gg=au.createGain();o.connect(gg);gg.connect(au.destination);o.type=tp||'sine';o.frequency.value=f;var s=au.currentTime+(dl||0);gg.gain.setValueAtTime(v||.06,s);gg.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d)}catch(e){}}
function sndGood(){snd(523,.08,'sine',.07);snd(659,.08,'sine',.06,.05);snd(784,.12,'sine',.07,.1)}
function sndGreat(){snd(523,.06,'sine',.08);snd(659,.06,'sine',.07,.04);snd(784,.06,'sine',.07,.08);snd(1047,.15,'sine',.08,.12)}
function sndHurt(){snd(200,.15,'sawtooth',.08);snd(150,.2,'sawtooth',.06,.1)}
function sndDrop(){snd(180,.15,'triangle',.07);snd(120,.2,'triangle',.05,.05);snd(90,.25,'triangle',.04,.1)}
function sndOver(){snd(400,.2,'sawtooth',.1);snd(300,.3,'sawtooth',.08,.15);snd(200,.5,'sawtooth',.1,.3)}
function sndBark(){snd(320,.05,'square',.05);snd(400,.04,'square',.04,.03);snd(360,.05,'square',.04,.06)}

function clickDog(){
  if(dogCD>0||!dogHasBall||dogBallsLeft<=0)return;
  dogCD=180;dogHasBall=false;dogBallsLeft--;
  dogBark=30;addBall();
  emit(dogX,dogY-10,'#FFD700',15,4);
  var msg='+BALL! (x'+countActive()+')';
  if(dogBallsLeft===0)msg+=' LAST!';
  else msg+=' left:'+dogBallsLeft;
  pop(dogX,dogY-35,msg,'#FFD700',true);
  sndBark();snd(440,.06,'square',.06);snd(660,.06,'square',.06,.05);
  shake=3;dogTX=dogX<W/2?W-100:100;dogSpd=3.5;
}

function getXY(ex,ey){var r=c.getBoundingClientRect();
  return{x:(ex-r.left)/r.width*W,y:(ey-r.top)/r.height*H}}

c.addEventListener('touchstart',function(e){e.preventDefault();if(au&&au.state==='suspended')au.resume();
if(state==='menu'){startGame();return}if(state==='dead'){state='menu';return}
for(var i=0;i<e.touches.length;i++){var p=getXY(e.touches[i].clientX,e.touches[i].clientY);
  var dd=Math.sqrt((p.x-dogX)*(p.x-dogX)+(p.y-dogY)*(p.y-dogY));
  if(dd<55&&dogHasBall&&dogCD<=0&&dogBallsLeft>0){clickDog();continue}
  if(p.x<W*.4)left=true;else if(p.x>W*.6)right=true}},{passive:false});
c.addEventListener('touchend',function(e){e.preventDefault();left=right=false},{passive:false});
c.addEventListener('click',function(e){if(au&&au.state==='suspended')au.resume();
if(state==='menu'){startGame();return}if(state==='dead'){state='menu';return}
var p=getXY(e.clientX,e.clientY);
var dd=Math.sqrt((p.x-dogX)*(p.x-dogX)+(p.y-dogY)*(p.y-dogY));
if(dd<55&&dogHasBall&&dogCD<=0&&dogBallsLeft>0){clickDog();return}
if(p.x<W*.35)left=true;else if(p.x>W*.65)right=true});
document.addEventListener('keydown',function(e){
if(e.key==='ArrowLeft'||e.key==='a')left=true;
if(e.key==='ArrowRight'||e.key==='d')right=true;
if(e.key===' '&&state==='play'&&dogHasBall&&dogCD<=0&&dogBallsLeft>0)clickDog();
if(state==='menu')startGame();
if(state==='dead'&&e.key==='Enter')state='menu';e.preventDefault()});
document.addEventListener('keyup',function(e){
if(e.key==='ArrowLeft'||e.key==='a')left=false;
if(e.key==='ArrowRight'||e.key==='d')right=false});

function emit(x,y,col,n,sp){for(var i=0;i<n;i++){var a=Math.random()*6.28,s=Math.random()*sp+1;
particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30+Math.random()*20,col:col})}}
function pop(x,y,txt,col,big){pops.push({x:x,y:y,txt:txt,col:col,life:55,big:big||false})}

// ═══ МЯЧИ ═══
function makeBall(idx,total){
  return{phase:(idx/total)*2,dropped:false,dx:0,dy:0,dvx:0,dvy:0,bounces:0,
    col:ballCols[idx%ballCols.length],trail:[]}
}
function countActive(){var n=0;for(var i=0;i<balls.length;i++)if(!balls[i].dropped)n++;return n}
function resetBalls(){balls=[];maxBalls=3;shakeEnergy=0;prevMoveDir=0;
  for(var i=0;i<3;i++)balls.push(makeBall(i,3))}

function addBall(){
  var active=countActive();
  var b=makeBall(balls.length,active+1);
  var phases=[];
  for(var i=0;i<balls.length;i++)if(!balls[i].dropped)phases.push(balls[i].phase);
  if(phases.length>0){phases.sort(function(a,b2){return a-b2});
    var mg=0,bp=0;
    for(var i=0;i<phases.length;i++){var nx=i<phases.length-1?phases[i+1]:phases[0]+2;
      if(nx-phases[i]>mg){mg=nx-phases[i];bp=(phases[i]+mg/2)%2}}
    b.phase=bp}
  balls.push(b);if(active+1>maxBalls)maxBalls=active+1;shakeEnergy+=6;
}

function dropBall(){
  var active=countActive();if(active<=1)return;
  var cands=[];for(var i=0;i<balls.length;i++)if(!balls[i].dropped)cands.push(i);
  var idx=cands[Math.floor(Math.random()*cands.length)];
  var b=balls[idx],pos=ballPos(b.phase);
  b.dropped=true;b.dx=pos.x+(Math.random()-.5)*20;b.dy=pos.y;
  b.dvx=pvx*0.5+(Math.random()-.5)*5;b.dvy=-3-Math.random()*3;b.bounces=0;
  shake=10;combo=0;comboTimer=0;
  emit(b.dx,b.dy,b.col,15,5);pop(b.dx,b.dy-30,'DROPPED!','#FF8844',true);sndDrop();
}

function getThreshold(){var a=countActive();return Math.max(12,50-(a-3)*10)}
function getWobbleAmt(){return Math.min(1,shakeEnergy/getThreshold())}

function ballPos(phase){
  var active=Math.max(countActive(),1),spread=36+active*5,arcH=60+active*16;
  var lx=px-spread,rx=px+spread,hy=playerY-18;
  var p=((phase%2)+2)%2,bx,by;
  if(p<1){bx=rx+(lx-rx)*p;by=hy-arcH*4*p*(1-p)}
  else{var p2=p-1;bx=lx+(rx-lx)*p2;by=hy-arcH*4*p2*(1-p2)}
  return{x:bx,y:by}
}

function updateBalls(){
  var speed=Math.abs(pvx),active=countActive();
  var curDir=pvx>1?1:(pvx<-1?-1:0);
  if(curDir!==0&&prevMoveDir!==0&&curDir!==prevMoveDir)shakeEnergy+=speed*4+7;
  if(curDir!==0)prevMoveDir=curDir;
  shakeEnergy+=speed*0.035;shakeEnergy*=0.983;
  if(shakeEnergy<0.1)shakeEnergy=0;
  if(shakeEnergy>getThreshold()&&active>1){dropBall();shakeEnergy=getThreshold()*0.25}
  if(active<=1&&dogBallsLeft<=0&&!dogHasBall){gameOver();return}
  var phaseSpd=0.018+active*0.001;
  for(var i=balls.length-1;i>=0;i--){var b=balls[i];
    if(b.dropped){b.dvy+=0.35;b.dx+=b.dvx;b.dy+=b.dvy;b.dvx*=0.97;
      if(b.dy>playerY+50){b.dy=playerY+50;b.dvy*=-0.25;b.dvx*=0.5;b.bounces++;
        if(b.bounces>3||Math.abs(b.dvy)<0.5)balls.splice(i,1)}
      if(b.dx<10||b.dx>W-10)b.dvx*=-0.5;continue}
    b.phase+=phaseSpd;if(b.phase>=2)b.phase-=2;
    var pos=ballPos(b.phase),wob=getWobbleAmt();
    b.trail.push({x:pos.x+Math.sin(t*0.12+i*2.1)*wob*18,y:pos.y+Math.cos(t*0.15+i*1.7)*wob*9});
    if(b.trail.length>6)b.trail.shift()}
  jugPhase+=phaseSpd;if(jugPhase>=2)jugPhase-=2;
}

function drawBalls(){
  var wob=getWobbleAmt();
  for(var i=0;i<balls.length;i++){var b=balls[i],bx,by;
    if(b.dropped){bx=b.dx;by=b.dy;g.globalAlpha=0.5}
    else{var pos=ballPos(b.phase);bx=pos.x+Math.sin(t*0.12+i*2.1)*wob*18;by=pos.y+Math.cos(t*0.15+i*1.7)*wob*9}
    g.fillStyle='rgba(0,0,0,0.08)';g.beginPath();g.ellipse(bx,playerY+42,6,2,0,0,6.28);g.fill();
    if(!b.dropped){for(var tr=0;tr<b.trail.length;tr++){g.globalAlpha=0.04*(tr/b.trail.length);g.fillStyle=b.col;
      g.beginPath();g.arc(b.trail[tr].x,b.trail[tr].y,6*(tr/b.trail.length),0,6.28);g.fill()}g.globalAlpha=1}
    var bg2=g.createRadialGradient(bx-3,by-3,0,bx,by,12);
    bg2.addColorStop(0,'#FFF');bg2.addColorStop(0.3,b.col);bg2.addColorStop(1,b.col);
    g.fillStyle=bg2;g.beginPath();g.arc(bx,by,11,0,6.28);g.fill();
    g.strokeStyle='rgba(0,0,0,0.2)';g.lineWidth=1;g.beginPath();g.arc(bx,by,11,0,6.28);g.stroke();
    g.globalAlpha=1;
    if(!b.dropped&&wob>0.4){var danger=(wob-0.4)/0.6,pulse=0.5+Math.sin(t*.15+i)*.3;
      g.strokeStyle='rgba(255,50,50,'+(danger*0.6*pulse)+')';g.lineWidth=2+danger*2;g.setLineDash([4,4]);
      g.beginPath();g.arc(bx,by,14+danger*4,0,6.28);g.stroke();g.setLineDash([]);
      if(danger>0.5){g.fillStyle='rgba(255,80,80,'+(danger*pulse)+')';g.font='bold 14px Arial';g.textAlign='center';g.fillText('!',bx,by-18)}}
  }
}

// ═══ ТАКСА ═══
function updateDog(){
  var dx=dogTX-dogX;
  if(Math.abs(dx)<15){dogTX=80+Math.random()*(W-160);dogSpd=0.6+Math.random()*0.5}
  dogDir=dx>0?1:-1;var spd=Math.min(dogSpd,Math.abs(dx)*0.03+0.2);
  dogX+=dogDir*spd;if(dogX<60)dogX=60;if(dogX>W-60)dogX=W-60;
  dogAnim+=spd*0.2;dogWag+=0.18;dogSpd+=(1-dogSpd)*0.01;
  if(dogCD>0){dogCD--;if(dogCD<=0&&dogBallsLeft>0)dogHasBall=true}
  if(dogBark>0)dogBark--;
}

function drawDog(){
  g.save();g.translate(dogX,dogY);g.scale(0.75,0.75);
  if(dogDir<0)g.scale(-1,1);
  var bounce=Math.abs(Math.sin(dogAnim))*2.5*(dogSpd>0.3?1:0.1);
  g.translate(0,-bounce);
  g.fillStyle='rgba(0,0,0,0.12)';g.beginPath();g.ellipse(5,bounce+15,24,5,0,0,6.28);g.fill();
  // Хвост
  var wag=Math.sin(dogWag*2.5)*.6;
  g.save();g.translate(-20,-2);g.rotate(-0.6+wag);
  g.strokeStyle='#CC6622';g.lineWidth=3.5;g.lineCap='round';
  g.beginPath();g.moveTo(0,0);g.quadraticCurveTo(-3,-10,-1,-18);g.stroke();g.restore();
  // Задние лапы
  for(var l=0;l<2;l++){var lx=-6+l*7,lo=Math.sin(dogAnim+l*3.14)*2.5;
    g.fillStyle='#BB5511';g.beginPath();g.moveTo(lx-2.5,6);g.lineTo(lx-3,14+lo);g.lineTo(lx+3,14+lo);g.lineTo(lx+2.5,6);g.closePath();g.fill();
    g.fillStyle='#CC6622';g.beginPath();g.ellipse(lx,15+lo,4,2,0,0,6.28);g.fill()}
  // Тело
  g.fillStyle='#CC6622';g.beginPath();g.ellipse(5,0,32,11,0,0,6.28);g.fill();
  g.fillStyle='#B55A18';g.beginPath();g.ellipse(3,-5,25,5,-0.05,3.14,6.28);g.fill();
  g.fillStyle='#DDA055';g.beginPath();g.ellipse(5,5,24,6,0,0,3.14);g.fill();
  // Передние лапы
  for(var l=0;l<2;l++){var lx=24+l*7,lo=Math.sin(dogAnim+3.14+l*3.14)*2.5;
    g.fillStyle='#BB5511';g.beginPath();g.moveTo(lx-2.5,6);g.lineTo(lx-3,14+lo);g.lineTo(lx+3,14+lo);g.lineTo(lx+2.5,6);g.closePath();g.fill();
    g.fillStyle='#CC6622';g.beginPath();g.ellipse(lx,15+lo,4,2,0,0,6.28);g.fill()}
  // Ошейник
  g.fillStyle='#DD2222';g.beginPath();g.ellipse(30,0,5,4.5,0.15,0,6.28);g.fill();
  g.fillStyle='#FFD700';g.beginPath();g.arc(33,2,3,0,6.28);g.fill();
  // Голова
  g.save();g.translate(37,-5);
  g.fillStyle='#CC6622';g.beginPath();g.ellipse(0,0,11,11,0,0,6.28);g.fill();
  g.fillStyle='#DD7733';g.beginPath();g.ellipse(14,3,10,7,0.08,0,6.28);g.fill();
  g.fillStyle='#CC6622';g.beginPath();g.ellipse(14,0,9,4,0.05,3.14,6.28);g.fill();
  g.fillStyle='#222';g.beginPath();g.ellipse(22,1,4,3.5,0,0,6.28);g.fill();
  g.fillStyle='rgba(255,255,255,0.2)';g.beginPath();g.arc(21,-0.5,1.5,0,6.28);g.fill();
  g.fillStyle='#FFF';g.beginPath();g.ellipse(2,-4,5,5.5,0,0,6.28);g.fill();
  g.fillStyle='#553300';g.beginPath();g.arc(3,-4,3,0,6.28);g.fill();
  g.fillStyle='#221100';g.beginPath();g.arc(3.5,-4,1.8,0,6.28);g.fill();
  g.fillStyle='#FFF';g.beginPath();g.arc(1.5,-5.5,1.3,0,6.28);g.fill();
  g.strokeStyle='#995522';g.lineWidth=2;g.lineCap='round';g.beginPath();g.arc(2,-8,5,3.6,5.8);g.stroke();
  // Ухо
  g.save();g.translate(-4,-5);g.rotate(-0.1+Math.sin(t*.05)*.05);
  g.fillStyle='#AA5511';g.beginPath();g.moveTo(0,0);g.quadraticCurveTo(-9,8,-7,22);
  g.quadraticCurveTo(-3,24,0,16);g.quadraticCurveTo(3,6,0,0);g.fill();
  g.fillStyle='#CC8844';g.beginPath();g.ellipse(-3,12,3,5,-0.1,0,6.28);g.fill();g.restore();
  // Рот
  if(dogBark>15){g.fillStyle='#CC6666';g.beginPath();g.ellipse(16,8,6,4,0.1,0,3.14);g.fill()
  }else if(dogSpd>2){g.fillStyle='#FF8888';g.beginPath();g.moveTo(16,5);g.quadraticCurveTo(18,10,15,14);g.quadraticCurveTo(13,10,16,5);g.fill()
  }else{g.strokeStyle='#885533';g.lineWidth=1;g.lineCap='round';g.beginPath();g.arc(16,4,4,0.1,1.5);g.stroke()}
  if(dogHasBall&&dogBallsLeft>0){var bc=ballCols[(balls.length)%8];
    g.fillStyle=bc;g.beginPath();g.arc(18,5,5.5,0,6.28);g.fill();
    g.fillStyle='rgba(255,255,255,0.3)';g.beginPath();g.arc(17,4,2,0,6.28);g.fill()}
  g.restore();g.restore();
  // Мячики-счётчик
  if(dogBallsLeft>0){for(var i=0;i<dogBallsLeft;i++){
    g.fillStyle=ballCols[i%8];g.beginPath();g.arc(dogX-10+i*6,dogY+14,3,0,6.28);g.fill()}}
  else{g.fillStyle='rgba(255,100,100,0.4)';g.font='9px Arial';g.textAlign='center';g.fillText('no balls',dogX,dogY+16)}
  // Подсказка
  if(dogHasBall&&dogCD<=0&&dogBallsLeft>0){
    var pulse=0.5+Math.sin(t*.08)*.4;
    g.strokeStyle='rgba(255,220,0,'+pulse+')';g.lineWidth=2;g.setLineDash([5,5]);
    g.beginPath();g.ellipse(dogX,dogY,42,22,0,0,6.28);g.stroke();g.setLineDash([]);
    var ty=dogY-25+Math.sin(t*.06)*3;
    g.fillStyle='rgba(0,0,0,0.4)';g.fillRect(dogX-35,ty-12,70,16);
    g.fillStyle='rgba(255,220,0,'+(0.7+pulse*0.3)+')';g.font='bold 11px Arial';g.textAlign='center';
    g.fillText('CLICK ('+dogBallsLeft+')',dogX,ty)}
  if(dogBark>15){g.fillStyle='#FFF';g.font='bold 13px Arial';g.textAlign='center';
    g.fillText('WOOF!',dogX+(dogDir>0?30:-30),dogY-22)}
}

// ═══ ЗРИТЕЛИ ═══
function drwCrowd(){
  var wob=state==='play'?getWobbleAmt():0;
  var lifeDanger=state==='play'?Math.max(0,1-lives/3):0;
  var ballDanger=state==='play'&&countActive()<=2&&dogBallsLeft<=1?0.5:0;
  var targetExcite=Math.min(1,wob*0.7+lifeDanger*0.4+ballDanger);
  crowdExcite+=(targetExcite-crowdExcite)*0.04;
  var ex=crowdExcite;
  for(var row=0;row<4;row++){var cnt=14+row*4;
    for(var i=0;i<cnt;i++){var tt=(i+.5)/cnt;
      var mx=W*.05+W*.9*tt,baseY=60+row*28+Math.sin(tt*3.14)*(6+row*3);
      var standUp=ex*12*(1+Math.sin(i*1.7+t*.03)*.3);
      var my=baseY-standUp,bn=Math.sin(t*.04+i+row)*(1+ex*8);
      var cols=['#E55','#58F','#5D5','#FA3','#F5F','#5FF','#F95','#FFF'];
      var skins=['#FFE0BD','#F5C5A3','#D4A373','#C68642'];
      g.fillStyle=cols[(i+row)%8];g.fillRect(mx-3,my+bn+3,6,7+standUp*0.5);
      g.fillStyle=skins[(i*3+row)%4];g.beginPath();g.arc(mx,my+bn,4,0,6.28);g.fill();
      if(ex>0.15){var armUp=ex;g.strokeStyle=skins[(i*3+row)%4];g.lineWidth=1.5;g.lineCap='round';
        g.beginPath();g.moveTo(mx-3,my+bn+5);g.lineTo(mx-4-armUp*3,my+bn+5-armUp*12+Math.sin(t*.08+i)*armUp*4);g.stroke();
        g.beginPath();g.moveTo(mx+3,my+bn+5);g.lineTo(mx+4+armUp*3,my+bn+5-armUp*12+Math.sin(t*.08+i+1)*armUp*4);g.stroke()}
      if(ex>0.5){g.fillStyle='#822';g.beginPath();g.ellipse(mx,my+bn+2,1.5,1+ex,0,0,6.28);g.fill()}
      if(ex>0.6&&i%5===0&&row<2){g.save();g.translate(mx,my+bn-12);g.rotate(Math.sin(t*.03+i)*.15);
        g.fillStyle='rgba(255,255,255,0.7)';g.fillRect(-12,-8,24,12);

  g.fillStyle='#FFF';g.font='bold 9px Arial';g.fillText(fill<0.3?'STABLE':fill<0.6?'SHAKY':'DANGER!',50,312);
  if(combo>1&&comboTimer>0){g.globalAlpha=Math.min(1,comboTimer/30);g.fillStyle='#FFD700';g.font='bold 18px Arial';g.fillText('COMBO x'+combo+'!',15,360);g.globalAlpha=1}
  g.fillStyle='#888';g.font='14px Arial';g.fillText('Best: '+Math.max(score,best),15,380);
  g.font='11px Arial';g.textAlign='right';g.fillStyle='#6A6';g.fillText('★♦♥🛡 = CATCH',W-15,232);g.fillStyle='#A55';g.fillText('●💣▄ = DODGE',W-15,248);
  g.fillStyle='#CA8';g.fillText('🐕 Dog: '+dogBallsLeft+'/5 balls',W-15,264);
  g.fillStyle='rgba(255,255,255,0.1)';g.font='8px Arial';g.textAlign='center';g.fillText('© 2025 Arena Juggler',W/2,H-3)}

function update(){if(state!=='play')return;t++;diff=1+t/2400;
  if(shake>0)shake-=.3;if(shield>0)shield--;if(invincible>0)invincible--;
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0}hype*=.995;
  var dir=0;if(left)dir=-1;if(right)dir=1;
  if(dir)pvx+=(dir*6.5-pvx)*.28;else pvx*=.86;px+=pvx;if(px<40)px=40;if(px>W-40)px=W-40;
  updateBalls();lastPvx=pvx;updateDog();
  var rate=Math.max(20,55-diff*5);spawnT++;
  if(spawnT>=rate){spawnT=0;spawnItem();if(diff>2.5&&Math.random()<.2)spawnItem();if(diff>4&&Math.random()<.1)spawnItem()}
  updItems();if(t%8===0)score+=Math.max(1,countActive())}

// ═══ ЭКРАНЫ ═══
function drwMenu(){t++;crowdExcite=0.05+Math.sin(t*.01)*.05;drwBg();drwCrowd();drwFloor();drwSpots();
  drawClown(W/2,playerY+10,1.3,t*.025,3);
  g.save();var ts=1+Math.sin(t*.02)*.03;g.translate(W/2,280);g.scale(ts,ts);
  g.fillStyle='#DAA520';g.font='bold 48px Arial';g.textAlign='center';g.strokeStyle='#000';g.lineWidth=6;
  g.strokeText('ARENA',0,-20);g.fillText('ARENA',0,-20);g.strokeText('JUGGLER',0,25);g.fillText('JUGGLER',0,25);g.restore();
  g.fillStyle='#FF6644';g.font='bold 18px Arial';g.textAlign='center';g.fillText('A D R E N A L I N E',W/2,320);

  g.fillStyle='rgba(0,0,0,0.6)';g.fillRect(W/2-185,440,370,155);g.strokeStyle='#DAA52033';g.lineWidth=1;g.strokeRect(W/2-185,440,370,155);
  g.font='13px Arial';g.fillStyle='#8C8';g.fillText('★ Star  ♥ Heart  ◆ Diamond  🛡 Shield = CATCH!',W/2,458);
  g.fillStyle='#F88';g.fillText('● Rock  💣 Bomb  ▄ Anvil = DODGE!',W/2,476);
  g.fillStyle='#FC8';g.font='bold 13px Arial';g.fillText('🐕 Click the Dachshund = +Ball (5 total)',W/2,498);
  g.fillStyle='#FF8';g.fillText('⚠ Sharp turns drop balls!',W/2,518);
  g.fillStyle='#F88';g.font='12px Arial';g.fillText('1 ball left + 0 dog balls = GAME OVER',W/2,538);
  g.fillStyle='#AAA';g.fillText('← → / A D / Touch sides  |  Space / Click dog',W/2,558);
  g.fillStyle='#888';g.fillText('Catch good items, dodge bad ones, keep juggling!',W/2,578);

  g.fillStyle='#DAA520';g.fillRect(W/2-90,375,180,50);g.strokeStyle='rgba(255,255,255,0.15)';g.lineWidth=1;g.strokeRect(W/2-90,375,180,50);
  g.fillStyle='#FFF';g.font='bold 28px Arial';g.fillText('PLAY',W/2,408);
  if(best>0){g.fillStyle='#DAA520';g.font='14px Arial';g.fillText('Best: '+best,W/2,365)}
  g.fillStyle='rgba(255,255,255,0.12)';g.font='9px Arial';g.fillText('© 2025 Arena Juggler. All rights reserved. '+BUILD,W/2,H-5)}

function drwGame(){g.save();if(shake>.5)g.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
  drwBg();drwCrowd();drwFloor();drwSpots();for(var i=0;i<items.length;i++)drawItem(items[i]);
  drawDog();drawClown(px,playerY,1,jugPhase,0);drawBalls();drwFX();g.restore();drwHUD()}

function drwDead(){t++;crowdExcite*=0.98;drwBg();drwCrowd();drwFloor();drwFX();
  g.fillStyle='rgba(0,0,0,.6)';g.fillRect(0,0,W,H);
  var pw=360,ph=420,ppx=W/2-pw/2,ppy=H/2-ph/2;
  g.fillStyle='rgba(15,8,30,.92)';g.fillRect(ppx,ppy,pw,ph);g.strokeStyle='#DAA520';g.lineWidth=3;g.strokeRect(ppx,ppy,pw,ph);
  g.textAlign='center';g.fillStyle='#FF4444';g.font='bold 36px Arial';g.fillText('GAME OVER',W/2,ppy+48);
  g.fillStyle='#FF8888';g.font='15px Arial';g.fillText(lives<=0?'Out of lives!':'Last ball — no reserves!',W/2,ppy+72);
  drawClown(W/2,ppy+170,.8,0,0);
  g.fillStyle='#FFF';g.font='bold 26px Arial';g.fillText('Score: '+score,W/2,ppy+255);
  g.fillStyle='#FFD700';g.font='16px Arial';g.fillText('Max balls juggled: '+maxBalls,W/2,ppy+280);
  if(score>=best&&score>0){g.fillStyle='#FFD700';g.font='bold 22px Arial';g.fillText('★ NEW RECORD! ★',W/2,ppy+312)}
  g.fillStyle='#DAA520';g.fillRect(W/2-80,ppy+330,160,50);g.fillStyle='#FFF';g.font='bold 22px Arial';g.fillText('RETRY',W/2,ppy+362);
  g.fillStyle='#888';g.font='12px Arial';g.fillText('Tap anywhere or press Enter',W/2,ppy+400);
  g.fillStyle='rgba(255,255,255,0.1)';g.font='9px Arial';g.fillText('© 2025 Arena Juggler',W/2,ppy+415)}

function loop(){g.clearRect(0,0,W,H);
  if(state==='menu')drwMenu();else if(state==='play'){update();drwGame()}else if(state==='dead')drwDead();
  requestAnimationFrame(loop)}
loop();

})();
</script>
